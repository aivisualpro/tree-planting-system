name: Types Check

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'shared/types/**'

jobs:
  check-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Generate types from staging
        run: |
          mkdir -p shared/types
          supabase gen types typescript --project-id ${{ secrets.STAGING_PROJECT_ID }} > shared/types/database.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Check for differences
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Database types are out of sync. Please run 'supabase gen types typescript' and commit the changes."
            git diff
            exit 1
          fi
