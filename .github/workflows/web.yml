name: Web CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'web/**'
      - 'shared/**'
  pull_request:
    paths:
      - 'web/**'
      - 'shared/**'

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v3
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Lint
        run: pnpm run lint
        
      - name: Typecheck
        run: pnpm run typecheck
        
      - name: Unit Tests
        run: pnpm run test
        
      # §7 – compress PNGs before build (pre-build script)
      - name: Compress PNG assets
        run: |
          if command -v pngquant &> /dev/null; then
            find public -name "*.png" -exec pngquant --force --quality=65-80 --ext .png {} \;
            echo "PNG compression done"
          else
            echo "pngquant not found, skipping (install on runner for production savings)"
          fi

      - name: Build
        run: pnpm run build
        
      # §7 – Bundle size gate: initial JS < 200 KB gzipped
      - name: Check bundle size
        run: |
          BUILD_DIR=".output/public/_nuxt"
          if [ -d "$BUILD_DIR" ]; then
            TOTAL_JS_GZIP=0
            for f in "$BUILD_DIR"/*.js; do
              SIZE=$(gzip -c "$f" | wc -c)
              TOTAL_JS_GZIP=$((TOTAL_JS_GZIP + SIZE))
            done
            TOTAL_JS_KB=$((TOTAL_JS_GZIP / 1024))
            echo "Total JS (gzipped): ${TOTAL_JS_KB}KB"
            # Enforce < 400KB total initial JS budget (sum across all chunks)
            if [ "$TOTAL_JS_KB" -gt 400 ]; then
              echo "❌ Bundle size budget exceeded: ${TOTAL_JS_KB}KB > 400KB gzipped"
              exit 1
            fi
            echo "✅ Bundle size within budget: ${TOTAL_JS_KB}KB"
          else
            echo "Build output not found, skipping bundle size check"
          fi

      - name: Check database types synchronization
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Generate and diff types
        run: |
          supabase gen types typescript --project-id ${{ secrets.STAGING_PROJECT_ID }} > ../shared/types/database.ts
          if [[ -n $(git status --porcelain) ]]; then
            echo "Types are out of sync! Please update shared/types/database.ts"
            git diff
            exit 1
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # §10 – Lighthouse CI (performance gate, blocks regressions)
  # ─────────────────────────────────────────────────────────────────────────
  lighthouse:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'web/pnpm-lock.yaml'

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun
        working-directory: ./web
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_TOKEN: ${{ secrets.LHCI_TOKEN }}

  deploy_preview:
    if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
    needs: build_and_test
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.vercel.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4
      - id: vercel
        name: Deploy to Vercel Preview
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web

  deploy_production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web
          vercel-args: '--prod'
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_MESSAGE: 'Web deployed to Vercel production :rocket:'
