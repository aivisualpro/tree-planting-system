name: tree_planting
description: A new Flutter project for Tree Planting.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.1.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.0
  
  # Local DB
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.21
  
  # Supabase
  supabase_flutter: ^2.5.0
  
  # Networking
  dio: ^5.4.3
  
  # Background & Sync
  workmanager: ^0.5.2
  connectivity_plus: ^6.0.3
  flutter_secure_storage: ^9.2.1
  
  # Media
  image_picker: ^1.1.1
  image: ^4.2.0
  cached_network_image: ^3.3.1
  
  # Security & GPS
  crypto: ^3.0.3
  signature: ^5.4.0
  geolocator: ^11.0.0
  permission_handler: ^11.3.1
  
  # i18n
  intl: ^0.19.0
  
  # Maps
  flutter_map: ^7.0.0
  latlong2: ^0.9.0
  
  # Sentry
  sentry_flutter: ^8.3.0
  
  # Other
  freezed_annotation: ^2.4.1
  mutex: ^3.1.0
  uuid: ^4.3.3
  
  # Security Additions
  http_certificate_pinning: ^1.0.4
  flutter_windowmanager: ^0.2.0
  screen_protector: ^1.1.2
  local_auth: ^2.2.0
  flutter_jailbreak_detection: ^1.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
    
  # Code Gen
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  drift_dev: ^2.16.0
  freezed: ^2.4.5  
  # Lints
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
